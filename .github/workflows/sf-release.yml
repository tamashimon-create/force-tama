# ==============================================================================
# ワークフロー名: Salesforce Release
# 概要: PRのマージをトリガーに、対応するSalesforce組織へリリースを実行する
#   - main        → 本番組織 (prod)
#   - staging     → Sandbox: stg
#   - development → Sandbox: dev
#
# 【注意】sf-metasync.sh による自動伝播 push ではデプロイを実行しない。
#         PRマージ（人間による意図的なリリース操作）時のみデプロイする。
# ==============================================================================
name: Salesforce Release

# ------------------------------------------------------------------------------
# 実行トリガーの設定
# ------------------------------------------------------------------------------
on:
  # PRがマージされたときのみ発火（直接 push では発火しない）
  pull_request:
    types: [closed]
    branches:
      - main
      - staging
      - development

  # 手動実行の許可（GitHubの画面上から「Run workflow」ボタンで任意のタイミングで実行可能にする）
  workflow_dispatch:

# ------------------------------------------------------------------------------
# ジョブの定義
# ------------------------------------------------------------------------------
jobs:
  release:
    # PRイベントの場合はマージ済みのみ実行（クローズだけでは実行しない）
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    # 実行環境: GitHubが提供する最新のUbuntu（Linux）ランナーを使用
    runs-on: ubuntu-latest

    # --------------------------------------------------------------------------
    # 実行ステップ
    # --------------------------------------------------------------------------
    steps:
      # Step 1: リリース対象環境をログ出力（GitHub Actions ログ・Summary に記録）
      - name: Show Release Target
        run: |
          BRANCH="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            ENV_LABEL="🚀 本番組織 (prod)"
          elif [ "$BRANCH" = "staging" ]; then
            ENV_LABEL="🧪 ステージング Sandbox (stg)"
          else
            ENV_LABEL="🔧 結合 Sandbox (dev)"
          fi
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          echo "::notice title=リリース先::${ENV_LABEL} | ブランチ: ${BRANCH}"

          echo "## 🎯 Salesforce Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| リリース先 | ${ENV_LABEL} |" >> $GITHUB_STEP_SUMMARY
          echo "| ブランチ | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$PR_NUMBER" ]; then
            echo "| PR | #${PR_NUMBER} ${PR_TITLE} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| 実行日時 | $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S JST') |" >> $GITHUB_STEP_SUMMARY

      # Step 2: リポジトリのソースコードをランナー環境にチェックアウト（取得）する
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          # sf-release.sh がブランチ名を git symbolic-ref で取得するため、完全な履歴を取得する
          fetch-depth: 0

      # Step 3: Salesforce CLI を動かすための Node.js 環境を構築
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      # Step 4: Salesforce CLI (sfコマンド) のインストール
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      # Step 5a: 本番組織への認証（mainブランチのみ）
      # ※ GitHubリポジトリの Settings > Secrets に SFDX_AUTH_URL_PROD を登録しておくこと
      - name: Authenticate to Salesforce (Production)
        if: (github.event.pull_request.base.ref || github.ref_name) == 'main'
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_PROD }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --set-default --alias prod
          rm -f auth.txt

      # Step 5b: stg Sandbox への認証（stagingブランチのみ）
      # ※ GitHubリポジトリの Settings > Secrets に SFDX_AUTH_URL_STG を登録しておくこと
      - name: Authenticate to Salesforce (stg Sandbox)
        if: (github.event.pull_request.base.ref || github.ref_name) == 'staging'
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_STG }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --set-default --alias stg
          rm -f auth.txt

      # Step 5c: dev Sandbox への認証（developmentブランチのみ）
      # ※ GitHubリポジトリの Settings > Secrets に SFDX_AUTH_URL_DEV を登録しておくこと
      - name: Authenticate to Salesforce (dev Sandbox)
        if: (github.event.pull_request.base.ref || github.ref_name) == 'development'
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_DEV }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --set-default --alias dev
          rm -f auth.txt

      # Step 6: sf-tools のクローン（sf-release.sh の実行に必要）
      - name: Clone sf-tools
        run: git clone https://github.com/tamashimon-create/sf-tools.git ~/sf-tools

      # Step 7: 対応するSalesforce組織へのリリース実行
      # release/<branch>/deploy-target.txt に記載されたコンポーネントをデプロイする
      - name: Release to Salesforce
        run: |
          BRANCH="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            TARGET="prod"
          elif [ "$BRANCH" = "staging" ]; then
            TARGET="stg"
          else
            TARGET="dev"
          fi
          # PRのマージ元ブランチ名（フィーチャーブランチ名）を branch_name.txt に書き込む
          # git管理外のため、Actions実行のたびに動的生成する
          SOURCE="${{ github.event.pull_request.head.ref || github.ref_name }}"
          echo "$SOURCE" > release/branch_name.txt
          chmod +x ~/sf-tools/sf-release.sh
          ~/sf-tools/sf-release.sh --release --no-open --target "$TARGET"

      # Step 8: Slack 通知（成功・失敗問わず常に実行）
      - name: Notify Slack
        if: always()
        run: |
          BRANCH="${{ github.event.pull_request.base.ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            ENV_LABEL="🚀 本番組織 (prod)"
          elif [ "$BRANCH" = "staging" ]; then
            ENV_LABEL="🧪 ステージング Sandbox (stg)"
          else
            ENV_LABEL="🔧 結合 Sandbox (dev)"
          fi

          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATETIME=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M:%S JST')

          if [ "${{ job.status }}" = "success" ]; then
            ICON=":white_check_mark:"
            STATUS_TEXT="リリース成功"
          else
            ICON=":x:"
            STATUS_TEXT="リリース失敗"
          fi

          PR_TEXT=""
          if [ -n "$PR_NUMBER" ]; then
            PR_TEXT="\n• PR: #${PR_NUMBER} ${PR_TITLE}"
          fi

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${ICON} *Salesforce Release ${STATUS_TEXT}*\n• リリース先: ${ENV_LABEL}\n• ブランチ: \`${BRANCH}\`${PR_TEXT}\n• 実行日時: ${DATETIME}\n• <${RUN_URL}|Actions ログを見る>\"}"
